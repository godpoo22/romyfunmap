  <script>
  (function () {
    // 分頁切換
    document.querySelectorAll('.hw-tab').forEach(function (tab) {
      tab.addEventListener('click', function () {
        document.querySelectorAll('.hw-tab').forEach(function (t) { t.classList.remove('active'); });
        document.querySelectorAll('.hw-panel').forEach(function (p) { p.classList.add('hidden'); });
        tab.classList.add('active');
        document.getElementById('hw-panel-' + tab.dataset.target).classList.remove('hidden');
      });
    });

    // 篩選按鈕：每個 hw-row 內單選，再點同一個取消
    document.querySelectorAll('.hw-row').forEach(function (row) {
      var btns = Array.prototype.slice.call(row.querySelectorAll('.hw-city-btn, .hw-tag-btn'));
      btns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var wasActive = btn.classList.contains('active');
          btns.forEach(function (b) { b.classList.remove('active'); });
          if (!wasActive) btn.classList.add('active');
        });
      });
    });

    // 送出 → 跳到篩選頁並帶入條件
    document.getElementById('hw-submit').addEventListener('click', function () {
      var activeTab = document.querySelector('.hw-tab.active');
      var dest = activeTab.dataset.target;
      var panel = document.getElementById('hw-panel-' + dest);

      var cityBtn = panel.querySelector('.hw-city-btn.active');
      var cities = cityBtn ? [cityBtn.dataset.city] : [];
      var tags = [];
      panel.querySelectorAll('.hw-tag-btn.active').forEach(function (btn) {
        tags.push(btn.dataset.tag);
      });

      var url = '/' + dest + '/';
      var qs = [];
      if (cities.length) qs.push('cities=' + encodeURIComponent(cities[0]));
      if (tags.length)   qs.push('tags='   + encodeURIComponent(tags.join(',')));
      if (qs.length) url += '?' + qs.join('&');
      window.location.href = url;
    });
  })();
  </script>
