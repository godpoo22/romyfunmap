          <p style="color:var(--text-muted);font-size:14px;margin:0;">位於中山站商圈附近的室內藝文館舍，適合安排雨天展覽與周邊散步行程。</p>
        </div>

          <table class="tabelog-table">
            <tbody>
              <tr>
                <th>入場費用</th>
                <td><p>依展覽檔期調整，部分活動或特定時段另有優惠。</p></td>

              <tr>
                <th>體驗內容</th>

              </tr>
              <tr>
                <th>基本資訊</th>

              </tr>
              <tr>
                <th>交通資訊</th>
                <td>
                  <p><strong>地址：</strong>台北市大同區長安西路 39 號。</p>
                  <p><strong>交通：</strong>捷運中山站步行可到，大眾運輸方便。</p>
