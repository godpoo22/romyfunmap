      <div class="container">

          <h1 style="font-size:28px;color:var(--text-dark);margin:10px 0;">北投溫泉博物館</h1>
          <p style="color:var(--text-muted);font-size:14px;margin:0;">日治時期公共浴場改建的歷史館舍，適合搭配地熱谷與溫泉公園安排北投半日行程。</p>
        </div>
        <section class="tabelog-wrap" style="background:rgba(255,255,255,0.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);margin-top:20px;">
          <h2 class="tabelog-title">詳細資訊</h2>
          <table class="tabelog-table">
            <tbody>
              <tr>
                <th>入場費用</th>
                <td><p><strong>免費參觀</strong>，館內以靜態展示與建築空間導覽為主。</p></td>
              </tr>
              <tr>
                <th>體驗內容</th>
                <td>
                  <p><strong>參觀重點：</strong>百年浴場建築、榻榻米大廳與北投溫泉文化展示。</p>
                  <p><strong>停留時間：</strong>約 40 分鐘到 1 小時。</p>
                </td>
              </tr>
              <tr>
                <th>基本資訊</th>

                  <p><strong>空間型態：</strong>室內歷史館舍。</p>
                  <p><strong>雨天備案：</strong>可正常安排，雨天也適合。</p>
                </td>
              </tr>
              <tr>
                <th>交通資訊</th>
                <td>
                  <p><strong>地址：</strong>台北市北投區中山路 2 號。</p>
                  <p><strong>交通：</strong>捷運新北投站步行可到，大眾運輸方便。</p>
