<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triple Cafe | 台北市親子餐廳</title>
    <meta name="description" content="整理 Triple Cafe 的空間特色、交通方式與親子用餐重點，方便安排內湖用餐行程。">
    <link rel="stylesheet" href="/assets/style.css">
    <script src="/assets/header.js"></script>
    <script src="/assets/app.js"></script>
  </head>
  <body>
    <div id="site-header-container" data-active="restaurants"></div>
    <main class="page-pad">
      <div class="container">
        <div style="margin-top:20px;">
          <div class="breadcrumb" style="color:var(--text-muted);font-size:13px;margin-bottom:10px;">
            <a href="/">首頁</a> / <a href="/taipei/">台北市</a> / <a href="/taipei/family-restaurants/">親子餐廳</a> / Triple Cafe
          </div>
          <h1 style="font-size:28px;color:var(--text-dark);margin:10px 0;">Triple Cafe</h1>
          <p style="color:var(--text-muted);font-size:14px;margin:0;">內湖人氣早午餐與聚餐空間，適合搭配附近公園或商場行程一起安排。</p>
        </div>
        <section class="tabelog-wrap" style="background:rgba(255,255,255,0.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);margin-top:20px;">
          <h2 class="tabelog-title">詳細資訊</h2>
          <table class="tabelog-table">
            <tbody>
              <tr>
                <th>餐廳類型</th>
                <td><p><strong>類型：</strong>家庭聚餐 / 早午餐餐廳。</p><p><strong>特色：</strong>座位數較多，推車與多人用餐都較好安排。</p></td>
              </tr>
              <tr>
                <th>用餐資訊</th>
                <td><p><strong>餐點方向：</strong>義大利麵、燉飯、早午餐拼盤。</p><p><strong>停留時間：</strong>約 1.5 小時。</p></td>
              </tr>
              <tr>
                <th>親子重點</th>
                <td><p>較適合家庭聚餐或順遊用餐，若帶幼兒同行可先確認兒童座椅供應。</p></td>
              </tr>
              <tr>
                <th>交通資訊</th>
                <td><p><strong>區域：</strong>台北市內湖區。</p><p><strong>交通：</strong>鄰近賣場商圈，開車方便。</p><p style="margin-top:8px;"><a href="https://www.google.com/maps/search/?api=1&query=Triple%20Cafe%20%E5%8F%B0%E5%8C%97" target="_blank" style="color:var(--primary);font-size:13px;text-decoration:underline;font-weight:bold;">在地圖上查看</a></p></td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>
    <div class="sticky-bottom-bar" style="background:rgba(255,255,255,0.85);backdrop-filter:blur(15px);">
      <div class="sticky-bottom-inner">
        <button class="action-share" data-copy-url>分享</button>
        <a href="https://www.google.com/maps/search/?api=1&query=Triple%20Cafe%20%E5%8F%B0%E5%8C%97" target="_blank" class="action-main-btn">在地圖查看位置</a>
      </div>
    </div>
    <div id="site-footer-container"></div>
    <script src="/assets/footer.js"></script>

  </body>
</html>
