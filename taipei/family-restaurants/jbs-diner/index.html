<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JB's Diner | 台北市親子餐廳</title>
    <meta name="description" content="整理 JB's Diner 的美式餐點、交通方式與親子用餐重點，方便安排天母聚餐。">
    <link rel="stylesheet" href="/assets/style.css">
    <script src="/assets/header.js"></script>
    <script src="/assets/app.js"></script>
  </head>
  <body>
    <div id="site-header-container" data-active="restaurants"></div>
    <main class="page-pad">
      <div class="container">
        <div style="margin-top:20px;">
          <div class="breadcrumb" style="color:var(--text-muted);font-size:13px;margin-bottom:10px;">
            <a href="/">首頁</a> / <a href="/taipei/">台北市</a> / <a href="/taipei/family-restaurants/">親子餐廳</a> / JB's Diner
          </div>
          <h1 style="font-size:28px;color:var(--text-dark);margin:10px 0;">JB's Diner</h1>
          <p style="color:var(--text-muted);font-size:14px;margin:0;">天母常見的家庭聚餐選擇，美式餐點份量足，適合多人帶孩子一起用餐。</p>
        </div>
        <section class="tabelog-wrap" style="background:rgba(255,255,255,0.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);margin-top:20px;">
          <h2 class="tabelog-title">詳細資訊</h2>
          <table class="tabelog-table">
            <tbody>
              <tr>
                <th>餐廳類型</th>
                <td><p><strong>類型：</strong>家庭聚餐 / 美式餐館。</p><p><strong>特色：</strong>適合多人聚餐，兒童同行相對方便。</p></td>
              </tr>
              <tr>
                <th>用餐資訊</th>
                <td><p><strong>餐點方向：</strong>漢堡、三明治、早午餐與炸物。</p><p><strong>停留時間：</strong>約 1 到 1.5 小時。</p></td>
              </tr>
              <tr>
                <th>親子重點</th>
                <td><p>適合學齡前以上家庭聚餐，建議假日前先訂位。</p></td>
              </tr>
              <tr>
                <th>交通資訊</th>
                <td><p><strong>區域：</strong>台北市士林區。</p><p><strong>交通：</strong>天母商圈周邊開車安排較方便。</p><p style="margin-top:8px;"><a href="https://www.google.com/maps/search/?api=1&query=JB%27s%20Diner%20%E5%A4%A9%E6%AF%8D" target="_blank" style="color:var(--primary);font-size:13px;text-decoration:underline;font-weight:bold;">在地圖上查看</a></p></td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>
    <div class="sticky-bottom-bar" style="background:rgba(255,255,255,0.85);backdrop-filter:blur(15px);">
      <div class="sticky-bottom-inner">
        <button class="action-share" data-copy-url>分享</button>
        <a href="https://www.google.com/maps/search/?api=1&query=JB%27s%20Diner%20%E5%A4%A9%E6%AF%8D" target="_blank" class="action-main-btn">在地圖查看位置</a>
      </div>
    </div>
    <div id="site-footer-container"></div>
    <script src="/assets/footer.js"></script>
