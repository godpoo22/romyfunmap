<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      貓裏喵親子公園 | 苗栗親子景點
    </title>
    <meta name="description" content="整理貓裏喵親子公園的遊具重點、停留時間與停車方式。" />
    <link rel="stylesheet" href="/assets/style.css" />
    <script src="/assets/header.js">
    </script>
    <script src="/assets/app.js">
    </script>
  </head>
  <body>
    <div id="site-header-container" data-active="attractions">
    </div>
    <main class="page-pad">
      <div class="container">
        <div style="margin-top:20px;">
          <div class="breadcrumb" style="color:var(--text-muted);font-size:13px;margin-bottom:10px;">
            <a href="/">
              首頁
            </a>
            /
            <a href="/miaoli/">
              苗栗
            </a>
            /
            <a href="/miaoli/family-attractions/">
              親子景點
            </a>
            / 貓裏喵親子公園
          </div>
          <h1 style="font-size:28px;color:var(--text-dark);margin:10px 0;">
            貓裏喵親子公園
          </h1>
          <p style="color:var(--text-muted);font-size:14px;margin:0;">
            整理貓裏喵親子公園的遊具重點、停留時間與停車方式。
          </p>
        </div>
        <section class="tabelog-wrap" style="background:rgba(255,255,255,0.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);margin-top:20px;">
          <h2 class="tabelog-title">
            詳細資訊
          </h2>
          <table class="tabelog-table">
            <tbody>
              <tr>
                <th>
                  遊玩重點
                </th>
                <td>
                  <p>
                    <strong>
                      主要設施：
                    </strong>
                    特色遊具、攀爬與滑梯空間。
                  </p>
                  <p>
                    適合安排孩子放電，建議帶替換衣物與飲水。
                  </p>
                </td>
              </tr>
              <tr>
                <th>
                  場地資訊
                </th>
                <td>
                  <p>
                    <strong>
                      空間型態：
                    </strong>
                    戶外特色公園。
                  </p>
                  <p>
                    白天遮蔭有限，夏季建議避開正中午。
                  </p>
                </td>
              </tr>
              <tr>
                <th>
                  基本資訊
                </th>
                <td>
                  <p>
                    <strong>
                      建議停留：
                    </strong>
                    1 到 2 小時。
                  </p>
                  <p>
                    <strong>
                      雨天備案：
                    </strong>
                    不適合。
                  </p>
                  <p>
                    <strong>
                      鄰近安排：
                    </strong>
                    可和苗栗市區行程一起排。
                  </p>
                </td>
              </tr>
              <tr>
                <th>
                  交通與停車
                </th>
                <td>
                  <p>
                    <strong>
                      地址：
                    </strong>
                    苗栗縣苗栗市自治路
                  </p>
                  <p>
                    <strong>
                      停車：
                    </strong>
                    周邊停車格
                  </p>
                  <p style="margin-top:8px;">
                    <a href="https://www.google.com/maps/search/?api=1&query=%E8%B2%93%E8%A3%8F%E5%96%B5%E8%A6%AA%E5%AD%90%E5%85%AC%E5%9C%92" style="color:var(--primary);font-size:13px;text-decoration:underline;font-weight:bold;" target="_blank">
                      在地圖上查看
                    </a>
                  </p>
                </td>
              </tr>
              <tr>
                <th>
                  適合年齡
                </th>
                <td>
                  <p>
                    幼兒到國小都適合，家長需留意各遊具年齡與高度差。
                  </p>
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </div>
    </main>
    <div class="sticky-bottom-bar" style="background:rgba(255,255,255,0.85);backdrop-filter:blur(15px);">
      <div class="sticky-bottom-inner">
        <button class="action-share" data-copy-url>
          分享
        </button>
        <a href="https://www.google.com/maps/search/?api=1&query=%E8%B2%93%E8%A3%8F%E5%96%B5%E8%A6%AA%E5%AD%90%E5%85%AC%E5%9C%92" target="_blank" class="action-main-btn">
          <span class="btn-icon" style="margin-right:8px;">
            📍
          </span>
          在地圖查看位置
        </a>
      </div>
    </div>
    <div id="site-footer-container"></div>
    <script src="/assets/footer.js"></script>

  </body>
</html>
