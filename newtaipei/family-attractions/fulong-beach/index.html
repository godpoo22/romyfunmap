          </div>
          <h1 style="font-size:28px;color:var(--text-dark);margin:10px 0;">福隆海水浴場</h1>
          <p style="color:var(--text-muted);font-size:14px;margin:0;">東北角常見的玩沙與海邊放風景點，適合夏季安排半日到一日行程。</p>
        </div>
        <section class="tabelog-wrap" style="background:rgba(255,255,255,0.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);margin-top:20px;">
          <h2 class="tabelog-title">詳細資訊</h2>
          <table class="tabelog-table">
            <tbody>
              <tr><th>入場費用</th><td><p>依園區公告與季節活動調整，夏季較常有營運與活動安排。</p></td></tr>
              <tr><th>體驗內容</th><td><p><strong>參觀重點：</strong>玩沙、踏浪、河海景觀與自行車順遊。</p><p><strong>停留時間：</strong>約 2 到 4 小時。</p></td></tr>
              <tr><th>基本資訊</th><td><p><strong>空間型態：</strong>戶外海灘景點。</p><p><strong>雨天備案：</strong>天候不佳時不建議安排。</p></td></tr>
              <tr><th>交通資訊</th><td><p><strong>區域：</strong>新北市貢寮區。</p><p><strong>交通：</strong>台鐵福隆站步行可到，大眾運輸可到。</p><p style="margin-top:8px;"><a href="https://www.google.com/maps/search/?api=1&query=%E7%A6%8F%E9%9A%86%E6%B5%B7%E6%B0%B4%E6%B5%B4%E5%A0%B4" target="_blank" style="color:var(--primary);font-size:13px;text-decoration:underline;font-weight:bold;">在地圖上查看</a></p></td></tr>
              <tr><th>適合年齡</th><td><p>幼兒到國小以上都能安排，需自備換洗衣物與防曬用品。</p></td></tr>
