<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>埔心牧場 | 桃園市親子景點</title>
    <meta name="description" content="整理埔心牧場的動物互動、草地活動與交通方式，方便安排楊梅親子一日行程。">
    <link rel="stylesheet" href="/assets/style.css">
    <script src="/assets/header.js"></script>
    <script src="/assets/app.js"></script>
  </head>
  <body>
    <div id="site-header-container" data-active="attractions"></div>
    <main class="page-pad"><div class="container">
      <div style="margin-top:20px;">
        <div class="breadcrumb" style="color:var(--text-muted);font-size:13px;margin-bottom:10px;"><a href="/">首頁</a> / <a href="/taoyuan/">桃園市</a> / <a href="/taoyuan/family-attractions/">親子景點</a> / 埔心牧場</div>
        <h1 style="font-size:28px;color:var(--text-dark);margin:10px 0;">埔心牧場</h1>
        <p style="color:var(--text-muted);font-size:14px;margin:0;">牧場動物互動、草地活動與簡易設施集中，適合安排楊梅半日到一日行程。</p>
      </div>
      <section class="tabelog-wrap" style="background:rgba(255,255,255,0.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.8);margin-top:20px;">
        <h2 class="tabelog-title">詳細資訊</h2>
        <table class="tabelog-table"><tbody>
          <tr><th>入場費用</th><td><p>依牧場票價與活動檔期調整，部分體驗另計。</p></td></tr>
          <tr><th>體驗內容</th><td><p><strong>活動方向：</strong>餵食動物、草地奔跑、牧場互動與簡易遊樂設施。</p><p><strong>停留時間：</strong>建議 3 到 5 小時。</p></td></tr>
          <tr><th>基本資訊</th><td><p><strong>空間型態：</strong>戶外牧場。</p><p><strong>雨天備案：</strong>雨天不建議安排長時間停留。</p></td></tr>
          <tr><th>交通資訊</th><td><p><strong>區域：</strong>桃園市楊梅區。</p><p><strong>交通：</strong>建議開車前往，開車方便。</p><p style="margin-top:8px;"><a href="https://www.google.com/maps/search/?api=1&query=%E5%9F%94%E5%BF%83%E7%89%A7%E5%A0%B4" target="_blank" style="color:var(--primary);font-size:13px;text-decoration:underline;font-weight:bold;">在地圖上查看</a></p></td></tr>
          <tr><th>適合年齡</th><td><p>低齡到國小都適合，建議自備防曬與換洗衣物。</p></td></tr>
        </tbody></table>
      </section>
    </div></main>
    <div class="sticky-bottom-bar" style="background:rgba(255,255,255,0.85);backdrop-filter:blur(15px);"><div class="sticky-bottom-inner"><button class="action-share" data-copy-url>分享</button><a href="https://www.google.com/maps/search/?api=1&query=%E5%9F%94%E5%BF%83%E7%89%A7%E5%A0%B4" target="_blank" class="action-main-btn">在地圖查看位置</a></div></div>

    <script src="/assets/footer.js"></script>
